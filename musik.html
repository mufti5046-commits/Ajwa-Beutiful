<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
body{
margin:0;
background:#87CEEB;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
}
.player{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}
button{
margin-top:20px;
border:none;
background:#4c86c6;
color:white;
padding:12px 25px;
border-radius:30px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="player">
<h2>🎵 Now Playing</h2>
<p>Nej Paro (Slowed)</p>
<button onclick="toggleMusic()">▶ Play / ⏸ Pause</button>
<audio id="music">
<source src="nej-paro-slowed.mp3" type="audio/mpeg">
</audio>
</div>
<script>
const music=document.getElementById("music");
function toggleMusic(){
 if(music.paused){music.play();}
 else{music.pause();}
}
</script>
</body>
</html>
